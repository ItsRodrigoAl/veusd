<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Intervenciones</title>
    <style>
        /* Estilos Generales */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 450px; margin: 40px auto; padding: 20px; background-color: #f4f6f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 25px; color: #1e3a8a; font-size: 1.6em; }
        
        /* Campos de Entrada */
        .campo { margin-bottom: 25px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 8px; color: #4b5563; font-size: 0.95em; display: flex; align-items: center; gap: 6px; }
        
        .input-group { display: flex; align-items: center; border: 2px solid #e5e7eb; border-radius: 8px; background: white; overflow: hidden; }
        .input-group:focus-within { border-color: #3b82f6; }
        
        input[type="number"] { flex: 1; padding: 12px; font-size: 1.2em; border: none; outline: none; text-align: left; font-weight: bold; background: transparent; width: 100%; }
        .badge { padding: 12px; font-weight: bold; color: #9ca3af; font-size: 0.95em; user-select: none; background: transparent; }
        .info-comision { font-size: 0.8em; color: #dd6b20; margin-top: 4px; font-weight: 500; }
        p.help { font-size: 0.85em; color: #6b7280; text-align: center; margin-top: 20px; }

        /* Ocultar Flechas de los Inputs de Número */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Sección de Preguntas Frecuentes */
        .faq-section { margin-top: 35px; border-top: 1px solid #e5e7eb; padding-top: 25px; text-align: left; }
        .faq-section h3 { color: #1e3a8a; margin-bottom: 20px; font-size: 1.3em; font-weight: bold; text-align: left; }
        
        details { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 12px; padding: 14px; cursor: pointer; transition: background 0.2s; }
        details:hover { background: #f8fafc; }
        
        summary { font-weight: 600; color: #374151; font-size: 0.95em; outline: none; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '➔'; font-size: 0.8em; color: #9ca3af; transition: transform 0.2s; }
        details[open] summary::after { transform: rotate(90deg); color: #3b82f6; }
        details p { margin-top: 10px; font-size: 0.9em; color: #6b7280; line-height: 1.5; margin-bottom: 0; }

        /* Configuración de los Tooltips */
        .tooltip { font-size: 0.85em; cursor: help; position: relative; display: inline-block; }
        .tooltip::after { content: attr(data-texto); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background-color: #1e293b; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 0.8em; font-weight: normal; white-space: normal; width: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; text-align: center; z-index: 10; }
        .tooltip::before { content: ""; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); border-width: 5px; border-style: solid; border-color: #1e293b transparent transparent transparent; opacity: 0; transition: opacity 0.2s ease; z-index: 10; }
        .tooltip:hover::after, .tooltip:hover::before { opacity: 1; }

        /* Estilo para el campo automático bloqueado */
        .campo-bloqueado {
        background-color: #f1f5f9 !important; /* Gris claro suave */
        border-color: #e2e8f0; }

        .campo-bloqueado input[readonly] {
        color: #64748b; /* Texto un poco más oscuro/opaco */
        cursor: not-allowed; /* Cursor de "bloqueado" al pasar el mouse */ }
        
    </style>
</head>
<body>

<div class="card">
    <h2>Calculadora Intervenciones</h2>

    <div class="campo">
        <label for="usdBdv">
            BDV 
            <span class="tooltip" data-texto="Monto en dólares dentro del banco.">❓</span>
        </label>
        <div class="input-group">
            <input type="number" id="usdBdv" oninput="calcularDesdeUSD()" placeholder="0.00" step="any">
            <div class="badge">USD</div>
        </div>
    </div>

    <div class="campo">
        <label for="montoBinance">
            BPAY/GPAY
            <span class="tooltip" data-texto="Monto a colocar en Binance para evitar error de saldo insuficiente.">❓</span>
        </label>
        <div class="input-group campo-bloqueado">
            <input type="number" id="montoBinance" placeholder="0.00" step="any" readonly>
            <div class="badge">USD</div>
        </div>
        <span class="info-comision">Comisión: -2.5%</span>
    </div>

    <div class="campo">
        <label for="montoUsdt">
            Binance
            <span class="tooltip" data-texto="Monto neto que recibirás en Binance tras las comisiones">❓</span>
        </label>
        <div class="input-group">
            <input type="number" id="montoUsdt" oninput="calcularDesdeUsdt()" placeholder="0.00" step="any">
            <div class="badge">USD</div>
        </div>
        <span class="info-comision">Comisión: -3.6%</span>
    </div>

    <p class="help">E+ deja de publicar tanta noticia chimba, grax</p>

    <div class="faq-section">
        <h3>Preguntas frecuentes</h3>

        <details>
            <summary>Error 30009</summary>
            <p onclick="this.parentElement.removeAttribute('open')">Coloca la cantidad que aparece en GPAY/BPAY</p>
        </details>

        <details>
            <summary>Error 30040</summary>
            <p onclick="this.parentElement.removeAttribute('open')">Baneado papu</p>
        </details>

        <details>
            <summary>Pregunta 3</summary>
            <p onclick="this.parentElement.removeAttribute('open')">Texto 3</p>
        </details>
    </div>
</div>

<script>
    const usdBdv = document.getElementById('usdBdv');
    const montoBinance = document.getElementById('montoBinance');
    const montoUsdt = document.getElementById('montoUsdt');

    // Constantes matemáticas fijas para las comisiones
    const descBinance = 0.975; // Representa el 100% - 2.5%
    const comUsdt = 0.964;     // Representa el 100% - 3.6%

    // 1. Si el usuario escribe en "USD en BDV"
    function calcularDesdeUSD() {
        const val = parseFloat(usdBdv.value);
        if (isNaN(val)) { montoBinance.value = ''; montoUsdt.value = ''; return; }

        const enBinance = val * descBinance;
        montoBinance.value = enBinance.toFixed(2);
        montoUsdt.value = (enBinance * comUsdt).toFixed(2);
    }

    // 2. Si el usuario escribe en "Monto a colocar en Binance"
    function calcularDesdeBinance() {
        const val = parseFloat(montoBinance.value);
        if (isNaN(val)) { usdBdv.value = ''; montoUsdt.value = ''; return; }

        usdBdv.value = (val / descBinance).toFixed(2);
        montoUsdt.value = (val * comUsdt).toFixed(2);
    }

    // 3. Si el usuario escribe en "Monto a recibir en USDT"
    function calcularDesdeUsdt() {
        const val = parseFloat(montoUsdt.value);
        if (isNaN(val)) { usdBdv.value = ''; montoBinance.value = ''; return; }

        const enBinance = val / comUsdt;
        montoBinance.value = enBinance.toFixed(2);
        usdBdv.value = (enBinance / descBinance).toFixed(2);
    }
</script>

</body>
</html>
