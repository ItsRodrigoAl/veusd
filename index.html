<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora BDV BPAY</title>
    <style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 450px; margin: 40px auto; padding: 20px; background-color: #f4f6f9; color: #333; }
.card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
h2 { text-align: center; margin-bottom: 25px; color: #1e3a8a; font-size: 1.6em; }
.campo { margin-bottom: 25px; display: flex; flex-direction: column; }
label { font-weight: 600; margin-bottom: 8px; color: #4b5563; font-size: 0.95em; }

/* ESTE ES EL TRUCO: El contenedor ahora simula ser el input */
.input-group { 
    display: flex; 
    align-items: center; 
    border: 2px solid #e5e7eb; 
    border-radius: 8px; 
    background: white;
    overflow: hidden;
}
.input-group:focus-within { border-color: #3b82f6; } /* Azul al hacer clic */

/* El input real se vuelve invisible y se alinea a la izquierda */
input[type="number"] { 
    flex: 1; 
    padding: 12px; 
    font-size: 1.2em; 
    border: none; 
    outline: none;
    text-align: left; /* Monto a la izquierda */
    font-weight: bold; 
    background: transparent;
    width: 100%;
}

/* El texto de la divisa se queda fijo a la derecha dentro del recuadro */
.badge { 
    padding: 12px; 
    font-weight: bold; 
    color: #9ca3af; /* Color gris suave de texto secundario */
    font-size: 0.95em; 
    user-select: none; /* Evita que se seleccione el texto al hacer doble clic */
    background: transparent;
}

.info-comision { font-size: 0.8em; color: #dd6b20; margin-top: 4px; font-weight: 500; }
p.help { font-size: 0.85em; color: #6b7280; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🧮 Calculadora</h2>

    <div class="campo">
        <label for="usdBdv">¿Cuántos USD tienes en BDV?</label>
        <div class="input-group">
            <input type="number" id="usdBdv" oninput="calcularDesdeUSD()" placeholder="0.00" step="any">
            <div class="badge">USD</div>
        </div>
    </div>

    <div class="campo">
        <label for="montoBinance">Monto a colocar en Binance</label>
        <div class="input-group">
            <input type="number" id="montoBinance" oninput="calcularDesdeBinance()" placeholder="0.00" step="any">
            <div class="badge">USD</div>
        </div>
        <span class="info-comision">Comisión: -2.5%</span>
    </div>

    <div class="campo">
        <label for="montoUsdt">Monto a recibir en Binance</label>
        <div class="input-group">
            <input type="number" id="montoUsdt" oninput="calcularDesdeUsdt()" placeholder="0.00" step="any">
            <div class="badge">USD</div>
        </div>
        <span class="info-comision">Comisión: -3.6%</span>
    </div>

    <p class="help">E+ deja de publicar tanta noticia chimba, grax</p>
</div>

<script>
    const usdBdv = document.getElementById('usdBdv');
    const montoBinance = document.getElementById('montoBinance');
    const montoUsdt = document.getElementById('montoUsdt');

    // Constantes matemáticas fijas para las comisiones
    const descBinance = 0.975; // Representa el 100% - 2.5%
    const comUsdt = 0.964;     // Representa el 100% + 3.6%

    // 1. Si el usuario escribe en "USD en BDV"
    function calcularDesdeUSD() {
        const val = parseFloat(usdBdv.value);
        if (isNaN(val)) { montoBinance.value = ''; montoUsdt.value = ''; return; }

        const enBinance = val * descBinance;
        montoBinance.value = enBinance.toFixed(2);
        montoUsdt.value = (enBinance * comUsdt).toFixed(2);
    }

    // 2. Si el usuario escribe en "Monto a colocar en Binance"
    function calcularDesdeBinance() {
        const val = parseFloat(montoBinance.value);
        if (isNaN(val)) { usdBdv.value = ''; montoUsdt.value = ''; return; }

        usdBdv.value = (val / descBinance).toFixed(2);
        montoUsdt.value = (val * comUsdt).toFixed(2);
    }

    // 3. Si el usuario escribe en "Monto a recibir en USDT"
    function calcularDesdeUsdt() {
        const val = parseFloat(montoUsdt.value);
        if (isNaN(val)) { usdBdv.value = ''; montoBinance.value = ''; return; }

        const enBinance = val / comUsdt;
        montoBinance.value = enBinance.toFixed(2);
        usdBdv.value = (enBinance / descBinance).toFixed(2);
    }
</script>

</body>
</html>
